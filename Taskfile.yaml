version: "3"

dotenv: [".env"]

tasks:
  demo:
    desc: "Run gradio demo"
    cmds:
      - uv run python -m apps.demo.app

  dataset-eda:
    desc: "Run Streamlit dataset browser for data/raw/videos.json"
    cmds:
      - uv run streamlit run apps/dataset_eda/app.py

  process-raw-dataset:
    desc: "Process raw dataset and build train/val CSV splits"
    cmds:
      - rm -rf "{{.DATASET_PROCESSED}}" | true
      - >
        uv run python scripts/process_raw_dataset.py
        {{.DATASET_RAW}}
        --max-songs 10
        --out-dir "{{.DATASET_PROCESSED}}"
      - >
        uv run python scripts/build_train_val_csv.py
        "{{.DATASET_PROCESSED}}"
        --train-csv "{{.TRAIN_DATASET}}"
        --val-csv "{{.VAL_DATASET}}"

  extract-features:train:
    desc: "Precompute mel + semantic feature cache for train split"
    cmds:
      - >
        uv run python scripts/precompute_mel_features.py
        --dataset "{{.TRAIN_DATASET}}"
        --cache-root "{{.CACHE_DIR}}"
      - >
        uv run python scripts/precompute_semantic_features.py
        --dataset "{{.TRAIN_DATASET}}"
        --cache-root "{{.CACHE_DIR}}"

  extract-features:val:
    desc: "Precompute mel + semantic feature cache for val split"
    cmds:
      - >
        uv run python scripts/precompute_mel_features.py
        --dataset "{{.VAL_DATASET}}"
        --cache-root "{{.CACHE_DIR}}"
      - >
        uv run python scripts/precompute_semantic_features.py
        --dataset "{{.VAL_DATASET}}"
        --cache-root "{{.CACHE_DIR}}"

  extract-features:
    desc: "Precompute mel + semantic feature cache for train and val splits"
    cmds:
      - task extract-features:train
      - task extract-features:val

  iterate-ft-train:
    desc: "Iterate cached feature train split once and exit"
    cmds:
      - >
        uv run python -m seed_vc.train.features_dataset
        --dataset "{{.TRAIN_DATASET}}"
        --cache-root "{{.CACHE_DIR}}"

  iterate-ft-val:
    desc: "Iterate cached feature val split once and exit"
    cmds:
      - >
        uv run python -m seed_vc.train.features_dataset
        --dataset "{{.VAL_DATASET}}"
        --cache-root "{{.CACHE_DIR}}"

  train:
    - uv run python -m seed_vc.train.train --dataset data/polyphony-project-dataset-tmp/pairs.csv

  tensorboard:
    - uv run python -m tensorboard.main --logdir runs

  eval:
    desc: "Generate conversions and compute Resemblyzer similarity."
    vars:
      DATASET: data/polyphony-project-dataset-tmp/pairs.csv
      CONFIG: runs/my_run_longest/config_dit_mel_seed_uvit_whisper_base_f0_44k.yml
      CHECKPOINT: "checkpoints/models--Plachta--Seed-VC/snapshots/257283f9f41585055e8f858fba4fd044e5caed6e/DiT_seed_v2_uvit_whisper_base_f0_44k_bigvgan_pruned_ft_ema.pth"
      NO_GENERATE: "false"
      EXTRA_ARGS: ""
    preconditions:
      - sh: '[[ "{{.NO_GENERATE}}" == "true" || -n "{{.CHECKPOINT}}" ]]'
        msg: "Provide CHECKPOINT=/path/to/ckpt.pth or set NO_GENERATE=true to skip generation."
    cmds:
      - >
        uv run python -m seed_vc.train.eval
        --dataset {{.DATASET}}
        --config {{.CONFIG}}
        {{if ne .CHECKPOINT ""}}--checkpoint {{.CHECKPOINT}}{{end}}
        {{if eq .NO_GENERATE "true"}}--no-generate{{end}}
        {{.EXTRA_ARGS}}
