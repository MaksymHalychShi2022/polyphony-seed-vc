version: "3"

dotenv: [".env"]

tasks:
  demo:
    desc: "Run gradio demo"
    cmds:
      - uv run python -m apps.demo.app --checkpoint runs/my_run/DiT_epoch_00007_step_00800.pth --config  configs/presets/config_dit_mel_seed_uvit_whisper_base_f0_44k.yml

  singmos:
    desc: "Run SingMOS scoring demo"
    cmds:
      - uv run python -m apps.singmos.app

  sam-audio:docker:
    desc: "Run SAM-Audio via official HF Space Docker image on port 7860"
    cmds:
      - >
        docker run -it -p 7860:7860 --platform=linux/amd64
        -e HF_TOKEN="{{.HF_TOKEN}}"
        registry.hf.space/lpeterl-sam-audio-webui:latest python app.py

  dataset-eda:
    desc: "Run Streamlit dataset browser for data/raw/videos.json"
    cmds:
      - uv run streamlit run apps/dataset_eda/app.py

  process-raw-dataset:
    desc: "Process raw dataset and build train/val CSV splits"
    cmds:
      - rm -rf "{{.DATA_PROCESSED}}" | true
      - uv run python scripts/process_raw_dataset.py --max-songs 10
      - uv run python scripts/build_train_val_csv.py

  extract-features:
    desc: "Precompute mel + semantic + f0 + embedding feature cache for all splits"
    cmds:
      - uv run python scripts/precompute_mel_features.py
      - uv run python scripts/precompute_semantic_features.py
      - uv run python scripts/precompute_f0_features.py
      - uv run python scripts/precompute_embedding_features.py

  iterate-ft-train: 
    desc: "Iterate cached feature train split once and exit"
    cmds:
      - uv run python -m seed_vc.train.features_dataset --split train

  iterate-ft-val:
    desc: "Iterate cached feature val split once and exit"
    cmds:
      - uv run python -m seed_vc.train.features_dataset --split val

  train:
    desc: "Train using precomputed cached features (Hydra overrides: run_name=x batch_size=4 max_steps=5000)"
    cmds:
      - uv run python -m seed_vc.train.train

  tensorboard:
    - uv run python -m tensorboard.main --logdir runs

  mlflow:
    desc: "Run MLflow tracking server"
    cmds:
      - uv run mlflow ui --backend-store-uri "{{.MLFLOW_TRACKING_URI}}"

  eval:
    desc: "Run the full staged evaluation pipeline"
    vars:
      CONFIG: configs/presets/config_dit_mel_seed_uvit_whisper_base_f0_44k.yml
      # CHECKPOINT: runs/my_run/DiT_epoch_00007_step_00800.pth
      SPLIT: val
    cmds:
      - >
        uv run python -m eval.cli
        --stage all
        --split {{.SPLIT}}
        --config {{.CONFIG}}
        # {{if ne .CHECKPOINT ""}}--checkpoint {{.CHECKPOINT}}{{end}}

  eval:generate:
    desc: "Run only the generate-results evaluation stage"
    vars:
      CONFIG: configs/presets/config_dit_mel_seed_uvit_whisper_base_f0_44k.yml
      CHECKPOINT: runs/my_run/DiT_epoch_00007_step_00800.pth
      SPLIT: val
    cmds:
      - >
        uv run python -m eval.cli
        --stage generate-results
        --split {{.SPLIT}}
        --config {{.CONFIG}}
        {{if ne .CHECKPOINT ""}}--checkpoint {{.CHECKPOINT}}{{end}}

  eval:metrics:
    desc: "Run only the compute-metrics stage"
    vars:
      SPLIT: val
      ENABLE_SINGMOS: true
    cmds:
      - >
        uv run python -m eval.cli
        --stage compute-metrics
        --split {{.SPLIT}}
        {{if eq .ENABLE_SINGMOS "true"}}--enable-singmos{{end}}

  eval:report:
    desc: "Run only the build-report stage"
    vars:
      SPLIT: val
    cmds:
      - >
        uv run python -m eval.cli
        --stage build-report
        --split {{.SPLIT}}

  eval:comparison:
    desc: "Build the standalone comparison report bundle"
    cmds:
      - uv run python scripts/build_combined_eval_report.py
