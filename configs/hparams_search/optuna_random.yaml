# @package _global_
# Optuna Random sweeper — infrastructure only.
# Identical search space to TPE; used for sampler comparison.
# Activate with: uv run python -m seed_vc.train.train -m hparams_search=optuna_random

defaults:
  - override /hydra/sweeper: optuna

optimized_metric: "eval/loss"

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    storage: null
    study_name: null
    n_jobs: 1
    direction: minimize
    n_trials: 20
    sampler:
      _target_: optuna.samplers.RandomSampler
      seed: 42
    params: {}
