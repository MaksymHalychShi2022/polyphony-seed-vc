# @package _global_
# Optuna hyperparameter search overlay.
# Activate with: uv run python -m seed_vc.train.train -m hparams_search=optuna

defaults:
  - override /hydra/sweeper: optuna

optimized_metric: "eval/loss"

hydra:
  mode: MULTIRUN
  sweeper:
    _target_: hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
    storage: null
    study_name: null
    n_jobs: 1
    direction: minimize
    n_trials: 20
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      n_startup_trials: 5
    params:
      optimizer.lr: interval(1e-5, 1e-3)
      trainer.batch_size: choice(2, 4, 8)
